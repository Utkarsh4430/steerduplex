# SteerDuplex Pilot Training Config
# Based on moshi-finetune format

data:
  train_data: "data/formatted/manifest_train.jsonl"
  eval_data: "data/formatted/manifest_eval.jsonl"
  shuffle: true

moshi_paths:
  hf_repo_id: "kyutai/moshiko-pytorch-bf16"

full_finetuning: false
lora:
  enable: true
  rank: 128
  scaling: 2.0
  ft_embed: false

# PersonaPlex guidelines: downweight non-semantic audio tokens by 0.02 (= 1/50),
# downweight padded text tokens by 0.3
first_codebook_weight_multiplier: 50.0
text_padding_weight: 0.3

duration_sec: 100
batch_size: 4
max_steps: 3000
num_microbatches: 1
gradient_checkpointing: true

optim:
  lr: 2e-6
  weight_decay: 0.1
  pct_start: 0.05

param_dtype: "bfloat16"

seed: 42
log_freq: 10

do_eval: true
eval_freq: 500

do_ckpt: true
ckpt_freq: 500
num_ckpt_keep: 5
save_adapters: true

run_dir: "runs/pilot_v1"

wandb:
  project: "steerduplex"
  run_name: "pilot_v1_lora128"
