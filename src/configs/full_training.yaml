# SteerDuplex Full Training Config
#
# Following PersonaPlex (ICASSP 2026):
#   - Full finetuning (NOT LoRA)
#   - Separate LR: depth transformer 4e-6, temporal 2e-6
#   - Adam with cosine annealing + linear warmup
#   - Max sequence length: 2048 tokens (163.84s at 12.5Hz)
#   - System prompt loss masking
#   - Non-semantic audio tokens downweighted by 0.02 (multiplier=50)
#   - Padded text tokens downweighted by 0.3
#
# Usage:
#   bash training/launch.sh configs/full_training.yaml 8
#
# Resume from checkpoint:
#   1. Set moshi_paths.moshi_path to the checkpoint .safetensors file
#   2. Re-run the same command (resume_state.pt is auto-detected)

# ---------------------------------------------------------------------------
# SteerDuplex custom settings (not in TrainArgs — read separately by train.py)
# ---------------------------------------------------------------------------
steerduplex:
  depth_lr: 4.0e-6        # PersonaPlex: depth transformer at 4e-6
  warmup_steps: 1000       # Linear warmup before cosine annealing
  num_epochs: 15           # Auto-computes max_steps from dataset hours + batch config
  run_name: "full_v3"      # v3: A-series (steer) + B-series (capabilities)

# ---------------------------------------------------------------------------
# Training data (auto-generated by merge_manifests, called from launch.sh)
# ---------------------------------------------------------------------------
data:
  train_data: "data/formatted/manifest_combined_train.jsonl"
  eval_data: "data/formatted/manifest_combined_eval.jsonl"
  shuffle: true

# ---------------------------------------------------------------------------
# Datasets: toggle on/off, cap hours. Set max_hours to "all" for everything.
# ---------------------------------------------------------------------------
datasets:
  synthetic:
    enabled: true
    max_hours: "all"
    total_hours: 2230      # ~119.6K convos: A-series 1000h + B-series 1230h (v4 expanded)
    manifest_train: "data/formatted/manifest_train.jsonl"
    manifest_eval: "data/formatted/manifest_eval.jsonl"

  # --- External data WITH system prompts (voice ref + sine + LLM prompt) ---
  annutacon:
    enabled: true
    max_hours: "all"
    total_hours: 1497
    manifest_train: "data/external/annutacon_prompted/manifest.jsonl"
    manifest_eval: null

  annutacon_studio:
    enabled: true
    max_hours: "all"
    total_hours: 107
    manifest_train: "data/external/annutacon_studio_prompted/manifest.jsonl"
    manifest_eval: null

  annutacon_remaining:
    enabled: true
    max_hours: "all"
    total_hours: 1303      # 6641 remaining Annutacon conversations
    manifest_train: "data/external/annutacon_remaining_prompted/manifest.jsonl"
    manifest_eval: null

  fisher:
    enabled: true
    max_hours: "all"
    total_hours: 2008      # 11699 telephone conversations (P1+P2)
    manifest_train: "data/external/fisher_prompted/manifest.jsonl"
    manifest_eval: null

  # --- External data WITHOUT system prompts (raw natural conversations) ---
  # ~15% of external data has no prompt region, teaching the model to
  # behave naturally when no system prompt is provided at inference.
  # Disabled for now — re-enable later once no-prompt inference is needed
  annutacon_noprompt:
    enabled: false
    max_hours: 225
    total_hours: 1497
    manifest_train: "data/external/annutacon/manifest_with_json.jsonl"
    manifest_eval: null

  fisher_noprompt:
    enabled: false
    max_hours: 240
    total_hours: 1616
    manifest_train: "data/external/fisher/manifest_with_json.jsonl"
    manifest_eval: null

# ---------------------------------------------------------------------------
# Model
# ---------------------------------------------------------------------------
moshi_paths:
  hf_repo_id: "kyutai/moshiko-pytorch-bf16"
  # For resume, set this to the checkpoint file path:
  # moshi_path: "runs/full_v1/checkpoints/step_XXXX/consolidated.safetensors"

# Full finetuning (PersonaPlex approach — NO LoRA)
full_finetuning: true
lora:
  enable: false
  rank: 0
  scaling: 1.0
  ft_embed: false

# PersonaPlex loss weighting
first_codebook_weight_multiplier: 50.0
text_padding_weight: 0.3

# ---------------------------------------------------------------------------
# Training
# ---------------------------------------------------------------------------
# PersonaPlex: 2048 tokens at 12.5Hz = 163.84s
duration_sec: 163.84

batch_size: 20             # per GPU (effective = batch_size × num_gpus)
max_steps: 50000           # Fallback; overridden by auto-compute: ~4702h × 15 epochs ≈ 16K steps
num_microbatches: 1
gradient_checkpointing: true

# PersonaPlex: Adam with cosine annealing
# Temporal transformer LR = 2e-6 (depth = 4e-6, set in steerduplex section)
optim:
  lr: 2.0e-6
  weight_decay: 0.1
  pct_start: 0.03          # Fallback warmup fraction if warmup_steps not set

param_dtype: "bfloat16"

seed: 42
log_freq: 10

do_eval: true
eval_freq: 1000

do_ckpt: true
ckpt_freq: 1000
num_ckpt_keep: null          # Save ALL checkpoints (PersonaPlex/Moshi: fixed steps, post-hoc benchmark selection)
save_adapters: false

overwrite_run_dir: false
run_dir: "runs"                    # base dir; actual path = runs/<run_name>_<timestamp>

wandb:
  project: "steerduplex"
  run_name: "full_v3"              # overridden by steerduplex.run_name + timestamp if set
