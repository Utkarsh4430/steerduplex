# SteerDuplex data generation config

# Phase 1: Transcript generation via LiteLLM
# LiteLLM supports 100+ providers: https://docs.litellm.ai/docs/providers
# Model format: "provider/model" e.g. "openai/gpt-4o", "anthropic/claude-3-opus"
# For self-hosted: set llm_base_url to your endpoint
transcript:
  llm_model: "Qwen/Qwen3-32B"  # model name as expected by your LiteLLM proxy
  llm_base_url: ""  # LiteLLM proxy URL (e.g., "http://localhost:4000/v1")
  llm_api_key: ""  # API key for LiteLLM proxy (or set OPENAI_API_KEY env var)
  temperature: 0.9
  max_tokens: 4096
  turns_range: [4, 12]
  categories_dir: "../data_categories"
  output_dir: "data/transcripts"
  num_workers: 8  # parallel LLM workers for transcript generation
  pilot_per_category:
    A1_customer_service: 60
    A2_qa_assistant: 60
    A3_tone_controlled: 60
    A4_persona_controlled: 60
    A5_style_accent: 40
    A6_speed_length: 40
    A7_emotional_empathetic: 40
    A8_failure_cases: 20
    A9_dynamic_steering: 200
    A10_graceful_failure: 40
  # Data type distribution (applied across categories)
  data_type_weights:
    standard: 0.50
    dynamic: 0.25
    counterfactual: 0.10
    long_form: 0.10
    graceful_failure: 0.05
  max_retries: 3  # per-conversation LLM call retries
  retry_wait_sec: 5  # base wait on rate limit (exponential backoff)

# Phase 2: Voice assignment
voices:
  assistant_presets: "data/voices/assistant/presets.yaml"
  user_pool: "data/voices/user/pool.jsonl"
  output_dir: "data/voice_assignments"

# Phase 3: TTS synthesis (Qwen3-TTS)
tts:
  # Assistant turns: CustomVoice model (preset speakers + instruct)
  assistant_model_id: "Qwen/Qwen3-TTS-12Hz-1.7B-CustomVoice"
  # User turns: Base model (voice cloning, no instruct)
  user_model_id: "Qwen/Qwen3-TTS-12Hz-1.7B-Base"
  device: "cuda:0"
  output_dir: "data/tts_audio"
  max_retries: 3
  sample_rate: 24000  # target output rate

# Phase 4: Channel assembly
assembly:
  sample_rate: 24000
  silence_range_ms: [200, 800]
  barge_in_prob: 0.05
  barge_in_overlap_ms: [100, 500]
  max_duration_sec: 100
  output_dir: "data/assembled"
  voice_prompt_duration_sec: 5.0
  sine_marker_freq_hz: 440
  sine_marker_duration_ms: 200

# Phase 5: Dataset formatting
dataset:
  output_dir: "data/formatted"
  manifest_path: "data/formatted/manifest.jsonl"
  eval_split_ratio: 0.05  # 5% held out for eval

# Quality filtering (lightweight for scale)
quality:
  wer_threshold: 0.20  # max word error rate
  min_duration_sec: 0.5  # minimum turn duration
  max_silence_ratio: 0.5  # max silence in a turn
  whisper_model: "medium"
