# B4: Instruction Following & Structured Output
# Target: ~5.2K conversations, ~115 hours
# Targets: VocalBench, URO-Bench, Audio MultiChallenge (Instruction Retention), Dynamic-SUPERB
# Source: Fully synthetic (LLM transcript + Qwen3-TTS)

description: >
  Conversations testing the model's ability to follow complex, multi-step,
  and constrained instructions through speech. Open SDMs lag their backbone
  LLMs on instruction following — this data closes that gap.

categories:
  multi_step_instructions:
    description: "First do X, then Y, finally Z"
    num_conversations: 800
    examples:
      - "Give me three fun facts about dolphins, then rank them from most to least surprising, then explain why you ranked them that way."
      - "Name 5 countries in Europe, then for each one, tell me their capital and one famous landmark."
      - "First, summarize what photosynthesis is in one sentence. Then explain each step. Then give me an analogy for it."
      - "List the steps to make pasta. Then go back and add timing for each step. Then suggest one variation."
    approach: >
      Model must complete ALL steps in order. User should sometimes catch
      missed steps: "Wait, you forgot the second part."

  format_constraints:
    description: "Answer in specific formats — lists, counts, lengths"
    num_conversations: 600
    examples:
      - "Give me exactly 5 reasons to exercise, no more, no less."
      - "Explain quantum computing in exactly 3 sentences."
      - "List the planets in order from the sun. Number each one."
      - "Give me a pros and cons list for working from home, with exactly 4 items on each side."
      - "Answer my next 3 questions with only one word each."
      - "Explain machine learning using only words a 5-year-old would know."

  conditional_triggers:
    description: "Persistent trigger-based behavior changes throughout conversation"
    num_conversations: 800
    examples:
      - "Whenever I mention an animal, tell me a fun fact about it."
      - "If my question contains a number, answer in exactly that many words."
      - "When I say 'switch', change from formal to casual language. When I say 'switch' again, go back."
      - "Every time I mention a country, also tell me its population."
      - "If the answer is a number, say it in words. If it's a name, spell it out."
      - "Whenever I ask about food, also suggest a drink pairing."
      - "If I sound frustrated, acknowledge my frustration before answering."
    approach: >
      Expanded from conditional_instructions. AudioMC shows conditional
      instruction following is "a distinct, harder sub-problem." These are
      PERSISTENT triggers that must fire reliably across the entire conversation
      — not just once. The trigger fires on turns 3, 5, 7, etc. whenever
      the condition is met. Include triggers based on: topic keywords,
      question types, specific phrases, user emotional cues. The user should
      catch missed triggers: "Hey, I mentioned a dog — where's my fun fact?"

  constraint_satisfaction:
    description: "Answer under specific constraints"
    num_conversations: 500
    examples:
      - "Explain gravity without using the word 'force'."
      - "Describe your favorite season without naming any season."
      - "Tell me a story where every sentence starts with the next letter of the alphabet."
      - "Explain the internet in under 30 words."
      - "Give me directions from a park to a library, but never say 'left' or 'right' — only use compass directions."

  role_switching:
    description: "Temporary role assignments within conversation"
    num_conversations: 400
    examples:
      - "For the next 3 turns, pretend I'm a job interviewer and you're the candidate."
      - "Let's do a mock customer service call. You be the customer, I'll be the agent."
      - "Act as a strict teacher for my next question, then switch back to being helpful."
    approach: >
      Model must enter and exit roles cleanly, maintaining the role for
      exactly the specified duration.

  meta_instructions:
    description: "Instructions about future behavior"
    num_conversations: 400
    examples:
      - "Remember this code word: 'pineapple'. When I say it later, tell me a joke."
      - "From now on, end every response with a related fun fact."
      - "I'm going to give you 5 pieces of information. After all 5, summarize them."
      - "After every answer you give, rate your own confidence from 1 to 10."

  negation_following:
    description: "Don't do X when doing Y"
    num_conversations: 400
    examples:
      - "Tell me about the solar system, but don't mention Earth."
      - "Explain how computers work without using any technical jargon."
      - "Describe a sunset without using any color words."
      - "Tell me about dogs, but never use the word 'pet' or 'animal'."
    approach: >
      Tests inhibition control — can the model suppress specific words or
      topics while still being informative?

  sequential_task_chains:
    description: "Multi-turn tasks where later steps depend on earlier results"
    num_conversations: 400
    examples:
      - turn_1: "Pick a random number between 1 and 100."
        turn_2: "Now multiply it by 3."
        turn_3: "Subtract 7 from that."
        turn_4: "Is the result even or odd?"
      - turn_1: "Choose a historical figure."
        turn_2: "What year were they born?"
        turn_3: "What else happened that year?"
        turn_4: "How might that event have influenced their life?"

  # --- NEW: Benchmark gap-filling categories (v4) ---

  stacked_constraints:
    description: "3-5 constraints active simultaneously across entire conversation"
    num_conversations: 500
    examples:
      - constraints:
          - "Keep all responses under 50 words"
          - "Include exactly one question in each response"
          - "Never use the word 'the'"
          - "End each response with a fun fact"
        test_turns: ["Tell me about the solar system", "How do volcanoes work?", "Explain photosynthesis"]
      - constraints:
          - "Respond only in bullet points"
          - "Each bullet must start with a verb"
          - "Include at least one statistic per response"
        test_turns: ["How can I get fitter?", "What about diet?", "And sleep?"]
      - constraints:
          - "Use only words a 10-year-old would know"
          - "Include one analogy per response"
          - "Keep each response to exactly 3 sentences"
        test_turns: ["How does WiFi work?", "What about gravity?", "Why is the sky blue?"]
    approach: >
      User establishes 3-5 constraints in turns 1-2, then asks 6-10 questions.
      Model must satisfy ALL constraints simultaneously on EVERY turn.
      The user actively monitors: "Hey, that was over 50 words!" or
      "You forgot the fun fact!" The model corrects immediately.
      Difficulty progression: start with 2 constraints, build to 5.
      Include conflicting-seeming constraints that are actually compatible
      (forces the model to think about how to satisfy all at once).

  multi_query_instructions:
    description: "Multiple questions in one turn, each needing individual treatment"
    num_conversations: 400
    examples:
      - instruction: "For each question I ask, give one counterargument and one supporting point."
        multi_turn: "Is remote work productive? And is it good for mental health?"
        model_should: "Address BOTH questions separately, each with its own counterargument and supporting point — 4 items total"
      - instruction: "Rate each topic from 1-10 for difficulty."
        multi_turn: "What about calculus, basic algebra, and statistics?"
        model_should: "Rate all three: calculus 8, algebra 3, statistics 6"
      - instruction: "For every item I mention, suggest an alternative."
        multi_turn: "I'm thinking pasta for dinner and maybe a movie afterward."
        model_should: "Suggest an alternative for pasta AND an alternative for the movie — not just one"
    approach: >
      AudioMC shows models fail when users ask 2-3 questions in one turn
      with a per-question instruction. Models typically only address ONE.
      This data trains the model to identify and respond to EACH question
      or item individually. Include: 2-question turns (common), 3-question
      turns (harder), and mixed-format turns where questions and statements
      are interleaved. The user catches misses: "You only answered one of
      my questions."

assistant_traits:
  default_persona: "precise, follows instructions exactly, acknowledges constraints"
  tts_instruct_templates:
    default: "clear, structured, organized delivery"
    listing: "numbered delivery, pause between items"
    constrained: "careful, deliberate, aware of restrictions"

user_traits:
  types:
    precise_instructor: {probability: 0.35, tts: "clear, direct, specific"}
    casual_requester: {probability: 0.25, tts: "relaxed, conversational"}
    testing_limits: {probability: 0.20, tts: "probing, watching for mistakes"}
    playful_challenger: {probability: 0.20, tts: "fun, creative, curious"}

conversation_structure:
  min_turns: 4
  max_turns: 10
  typical_turns: 6
  backchannel_probability: 0.2

data_type_override:
  standard: 0.80
  long_form: 0.10
  dynamic: 0.10
