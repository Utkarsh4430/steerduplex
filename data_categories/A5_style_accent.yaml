# A5: Style & Accent Conversations
# Target: ~10K conversations, ~150 hours
# Source: Fully synthetic (LLM transcript + Qwen3-TTS)

description: >
  Conversations testing the model's ability to adopt specific speaking styles
  and accents. The USER requests the style/accent at the start of the conversation
  (e.g., "talk like a news anchor" or "use a British accent"), and the assistant
  must maintain it throughout. System prompt is minimal (role only).

  NOTE: For DYNAMIC style changes mid-conversation, see A9_dynamic_steering.yaml.

speaking_styles:
  formal:
    description: "Proper grammar, no contractions, structured sentences"
    tts_instruct: "formal, proper, no contractions, structured delivery, refined"
    example_system_prompt: "Speak in a highly formal manner. Use proper grammar, avoid contractions, and maintain a dignified tone."
    suitable_topics: [business, diplomacy, academic, legal, ceremonies]

  casual:
    description: "Relaxed, contractions, colloquialisms, friendly"
    tts_instruct: "casual, relaxed, natural contractions, friendly and easy"
    example_system_prompt: "Keep it casual and conversational. Talk like you're chatting with a friend."
    suitable_topics: [daily_life, hobbies, recommendations, stories, chat]

  poetic:
    description: "Lyrical, metaphorical, rhythmic phrasing"
    tts_instruct: "lyrical, flowing rhythm, emphasis on beautiful phrasing, poetic cadence"
    example_system_prompt: "Speak poetically. Use metaphors, lyrical phrasing, and rhythmic language."
    suitable_topics: [nature, love, beauty, philosophy, art, emotions]

  pirate_speak:
    description: "Arrr, matey! Nautical terms, ye/yer, swashbuckling vocabulary"
    tts_instruct: "rough, hearty, pirate cadence, boisterous, rolling r's"
    example_system_prompt: "Talk like a pirate. Use 'arr', 'matey', 'ye', nautical terms."
    suitable_topics: [any_reframed_as_adventure, treasure, sea, quests]

  old_english:
    description: "Thee, thou, prithee, archaic vocabulary"
    tts_instruct: "theatrical, archaic rhythm, dramatic pauses, grand delivery"
    example_system_prompt: "Speak in old English style. Use thee, thou, prithee, and archaic sentence structures."
    suitable_topics: [any, especially_dramatic_topics]

  valley_girl:
    description: "Like, totally, upspeak, vocal fry, California casual"
    tts_instruct: "upspeak, rising intonation at end of sentences, casual, valley girl cadence"
    example_system_prompt: "Talk in a Valley Girl style. Use 'like', 'totally', 'oh my god', upspeak."
    suitable_topics: [shopping, social, gossip, opinions, fashion]

  military:
    description: "Concise, hierarchical, acronyms, mission-oriented"
    tts_instruct: "clipped, efficient, military precision, no wasted words, commanding"
    example_system_prompt: "Speak with military precision. Be concise, use military terminology, stay mission-focused."
    suitable_topics: [planning, execution, reports, discipline, strategy]

  academic:
    description: "Scholarly, citations, hedging, nuanced"
    tts_instruct: "scholarly, measured, hedging language, nuanced delivery, intellectual"
    example_system_prompt: "Speak in an academic register. Use precise terminology, hedge claims appropriately, cite frameworks."
    suitable_topics: [research, theories, analysis, methodology, debate]

  storytelling:
    description: "Narrative flow, building tension, vivid descriptions"
    tts_instruct: "narrative flow, building tension, vivid, varied pace for dramatic effect"
    example_system_prompt: "Tell everything as a story. Build narrative, use vivid descriptions, create tension and resolution."
    suitable_topics: [any_topic_as_narrative, history, experiences, explanations]

  minimalist:
    description: "Extremely brief, telegraphic, essential words only"
    tts_instruct: "brief, minimal, pauses between short phrases, no filler"
    example_system_prompt: "Be extremely concise. Use as few words as possible. Telegraphic style."
    suitable_topics: [facts, directions, answers, definitions]

  verbose:
    description: "Elaborate, detailed, tangential, never uses one word where ten will do"
    tts_instruct: "elaborate, flowing, detailed, tangential asides, never stopping"
    example_system_prompt: "Be extremely verbose and detailed. Elaborate on everything, add context, tangents, and rich description."
    suitable_topics: [explanations, descriptions, stories, opinions]

  socratic:
    description: "Answers questions with questions, guides discovery"
    tts_instruct: "questioning intonation, thoughtful, guiding, patient, Socratic rhythm"
    example_system_prompt: "Use the Socratic method. Instead of giving direct answers, guide through questions. Help the user discover answers themselves."
    suitable_topics: [learning, philosophy, problem_solving, ethics]

  news_anchor:
    description: "Professional broadcast style, clear diction, authoritative"
    tts_instruct: "broadcast professional, clear diction, authoritative, measured pace, anchor delivery"
    example_system_prompt: "Speak like a professional news anchor. Clear, authoritative, well-paced delivery."
    suitable_topics: [news, reports, summaries, analysis, current_events]

  whispered:
    description: "Quiet, intimate, secretive"
    tts_instruct: "whispered, quiet, intimate, secretive delivery, soft and close"
    example_system_prompt: "Speak in a whisper. Keep your voice very quiet, intimate, as if sharing a secret."
    suitable_topics: [secrets, bedtime, library, intimate_conversation]

  sports_commentator:
    description: "Play-by-play energy, building excitement, dramatic"
    tts_instruct: "play-by-play energy, building excitement, dramatic peaks, fast-paced"
    example_system_prompt: "Speak like a sports commentator. Build excitement, use play-by-play style, dramatic moments."
    suitable_topics: [any_reframed_as_sports_event, competition, action, highlights]

accents:
  british_rp:
    description: "Received Pronunciation, Queen's English"
    tts_instruct: "British RP accent, proper and refined, clear articulation"
    voice_source_preference: "CommonAccent British speakers"

  british_cockney:
    description: "East London accent, informal, distinctive vowels"
    tts_instruct: "Cockney accent, informal, distinctive East London pronunciation"
    voice_source_preference: "CommonAccent British speakers"

  southern_american:
    description: "American South, drawl, warm, unhurried"
    tts_instruct: "Southern American accent, warm drawl, unhurried, y'all"
    voice_source_preference: "CommonAccent American Southern speakers"

  new_york:
    description: "NYC accent, fast-paced, distinctive vowels"
    tts_instruct: "New York accent, fast-paced, distinctive vowels, direct"
    voice_source_preference: "CommonAccent NYC speakers"

  australian:
