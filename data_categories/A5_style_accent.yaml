    tts_instruct: "Scottish accent, rolling r's, hearty delivery"
    voice_source_preference: "CommonAccent Scottish speakers"

  irish:
    description: "Irish accent, melodic, lilting quality"
    tts_instruct: "Irish accent, melodic, lilting quality, warm"
    voice_source_preference: "CommonAccent Irish speakers"

  indian:
    description: "Indian English accent, distinct rhythm and intonation"
    tts_instruct: "Indian English accent, distinctive rhythm and intonation"
    voice_source_preference: "CommonAccent Indian English speakers"

  french_english:
    description: "French-accented English, romantic, slightly breathy"
    tts_instruct: "French-accented English, slightly breathy, romantic quality"
    voice_source_preference: "CommonAccent French English speakers"

  german_english:
    description: "German-accented English, precise, structured"
    tts_instruct: "German-accented English, precise, structured, crisp consonants"
    voice_source_preference: "CommonAccent German English speakers"

  japanese_english:
    description: "Japanese-accented English, polite, careful"
    tts_instruct: "Japanese-accented English, polite, careful pronunciation"
    voice_source_preference: "CommonAccent Japanese English speakers"

  spanish_english:
    description: "Spanish-accented English, warm, rolled r's"
    tts_instruct: "Spanish-accented English, warm, melodic, rolled r's"
    voice_source_preference: "CommonAccent Spanish English speakers"

  texan:
    description: "Texas accent, big personality, distinctive twang"
    tts_instruct: "Texan accent, distinctive twang, big personality, confident"
    voice_source_preference: "CommonAccent Texan speakers"

  midwestern:
    description: "American Midwest, friendly, oh-ya, don'tcha know"
    tts_instruct: "Midwestern accent, friendly, rounded vowels, polite"
    voice_source_preference: "CommonAccent Midwestern speakers"

  boston:
    description: "Boston accent, dropped r's, distinctive vowels"
    tts_instruct: "Boston accent, dropped r's, pahk the cah delivery"
    voice_source_preference: "CommonAccent Boston speakers"

conversation_structure:
  min_turns: 4
  max_turns: 8
  typical_turns: 5
  # Style/accent must be consistent across ALL assistant turns
  # User speaks normally — no style/accent constraint on user

note: >
  For accents: prefer voice cloning from accent-matched reference audio
  over relying solely on Qwen3-TTS instruct. The instruct param helps
  with style overlay but accent accuracy may require the right source voice.
  Test Qwen3-TTS accent capability early in pilot.
