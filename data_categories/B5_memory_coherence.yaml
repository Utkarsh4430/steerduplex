# B5: Multi-turn Memory & Coherence
# Target: ~6.8K conversations
# Targets: Audio MultiChallenge (Inference Memory, Self Coherence), Full-Duplex-Bench v2
# Source: Fully synthetic (LLM transcript + Qwen3-TTS)

description: >
  Short spoken conversations (3-6 turns, occasionally up to 10 for numerical
  state tracking) testing six memory-related behaviors. The connective tissue
  across all six is the AUDIBLE MIRROR pattern — the assistant audibly echoes
  recalled information rather than silently applying it. This is what makes
  memory work for a voice model.

categories:
  reference_resolution:
    description: >
      User makes an indirect reference — by attribute ("the climber", "the
      older one") or vague callback ("that thing you mentioned", "the enzyme
      one"). Assistant resolves the reference and mirrors it back explicitly
      (name + attribute, or topic + specifics) before answering.
    num_conversations: 1500
    examples:
      - shape: attribute_disambiguation
        user_intro: "Marcus is 34, into woodworking. Theo's 31, a rock climber."
        user_reference: "Let's start with the climber."
        assistant_mirror: "Okay, so for Theo, the climber..."
      - shape: vague_callback
        user_topic: "Explain photosynthesis."
        user_reference: "Going back to that enzyme thing you mentioned..."
        assistant_mirror: "Right, Rubisco — ..."
    approach: >
      ~70% attribute-based entity disambiguation (multiple entities introduced,
      one referenced indirectly later). ~30% vague topic callback (fuzzy
      reference like "that thing we discussed"). The mirror states the name
      AND echoes the distinguishing attribute, or restates the specific topic
      before continuing.

  incidental_memory:
    description: >
      User casually drops a personal detail (allergy, living situation, family,
      schedule) as a side comment, not the main topic. Two to three turns of
      unrelated conversation pass. Then the user asks something where the
      earlier detail is relevant — without prompting recall. Assistant
      proactively connects.
    num_conversations: 1500
    examples:
      - plant: "Just so you know, I'm allergic to shellfish."
        filler: "[planning anniversary dinner across 3 turns]"
        recall: "Any restaurant suggestions?"
        expected_mirror: "Given the shellfish allergy, Northern Italian works in your favor..."
    approach: >
      The detail is dropped INCIDENTALLY ("oh, by the way", "just so you know"),
      not as the focus of the turn. The recall turn does NOT explicitly ask the
      assistant to remember anything — it just makes a request the earlier
      detail is relevant to. The assistant's mirror happens at the recall point
      ("given your shellfish allergy, I'd lean toward...").

  self_coherence:
    description: >
      User misattributes something to the assistant — restates the assistant's
      prior statement incorrectly and acts on the wrong version. Often
      implicit (acting on a flipped premise rather than announcing "you said
      X"). Assistant catches the misattribution and corrects firmly but warmly,
      pointing back to what was actually said.
    num_conversations: 1000
    examples:
      - assistant_said: "Le Guin's Left Hand of Darkness is the philosophical pick. Andy Weir's Project Hail Mary is plot-driven."
        user_misattributes_implicitly: "Ooh, the philosophical one sounds great. I'll grab the Andy Weir for vacation."
        assistant_corrects: "Small mix-up there — the philosophical one is The Left Hand of Darkness, the Le Guin..."
    approach: >
      Most examples should use the IMPLICIT pattern — the false claim is
      embedded in a follow-up move, not announced. Assistant must NOT cave to
      social pressure. Correction is firm but warm — no defensiveness, just
      gently re-anchor to what was actually said. Trains "stand firm" social
      posture (contrast with contradiction_detection).

  numerical_state_tracking:
    description: >
      User builds a running quantity across turns — totals, budgets, calorie
      loads, counts — with items added, removed, substituted. Assistant
      maintains correct cumulative state, mirrors each change with the updated
      total, and answers totals or derived metrics on demand.
    num_conversations: 1000
    examples:
      - scenario: grocery_budget
        flow:
          - "$8 chicken → running total $8"
          - "+$4 eggs +$5 milk → $17"
          - "+$2 pasta +$4 marinara → $23"
          - "swap marinara for $7 parmesan → net +$3, $26"
        derived_query: "What's left in my budget? And dairy sub-total?"
    approach: >
      Each user turn introduces a quantity change. Assistant mirrors with the
      updated total ("up to $23"). At least one turn should involve a
      SUBSTITUTION (remove X, add Y in same turn) handled as a NET change.
      Final turn often asks for a derived query: remaining budget, category
      sub-total, or ratio.

  progressive_synthesis:
    description: >
      User reveals requirements/preferences/constraints one at a time across
      turns, often without realizing they're "building a brief". Assistant
      backchannels each constraint as it arrives, then synthesizes ALL of them
      into a final recommendation that visibly respects every constraint.
    num_conversations: 1000
    examples:
      - scenario: bike_recommendation
        constraints_drip_fed:
          - "commute 6 miles + 30-40 mile weekend rides"
          - "all pavement"
          - "$1200-1500 budget"
          - "fourth-floor walk-up (weight matters)"
          - "comfort over aggressive posture"
        final_synthesis: >
          recap of ALL constraints, then recommendation visibly tying each
          feature back to a constraint
    approach: >
      Drip-fed requirements (typically 4-6 constraints, one per turn).
      Assistant mirrors each as revealed ("comfort over aggressive — got it").
      Final assistant turn does an EXPLICIT recap of all constraints before
      delivering the recommendation, and the recommendation must visibly tie
      each feature back to a constraint.

  contradiction_detection:
    description: >
      User states something contradicting a fact THEY THEMSELVES shared
      earlier (often inadvertently). Assistant gently flags the inconsistency
      as a curious question — not an accusation — leaving room for the user
      to clarify or explain.
    num_conversations: 800
    examples:
      - early_fact: "We're both vegetarian, so somewhere with solid meat-free options."
        contradicting_request_3_turns_later: "Make sure they have a good steak option."
        assistant_flag: >
          "I had it in my head that you both were vegetarian from earlier.
          Did I catch that wrong, or has something shifted?"
    approach: >
      User establishes a fact about themselves casually early on. A few turns
      later, they say something that contradicts it. Assistant flags by
      attributing potential misunderstanding to ITSELF ("I had it in my head
      that...") and offering charitable explanations ("did I catch that wrong,
      or has something shifted?"). Tone is gentle, curious, non-accusatory.
      Trains a DIFFERENT social posture from self_coherence — defer to the
      user, not stand firm.

assistant_traits:
  default_persona: "excellent memory, audibly mirrors recalled information, catches inconsistencies"
  tts_instruct_templates:
    default: "clear, attentive, engaged"
    recalling: "thoughtful, referencing earlier points"
    correcting: "gentle, non-confrontational, factual"

user_traits:
  types:
    detailed_storyteller: {probability: 0.30, tts: "detailed, conversational, building a picture"}
    tester: {probability: 0.25, tts: "probing, trying to catch mistakes"}
    natural_chatter: {probability: 0.25, tts: "casual, organic topic flow"}
    confused_user: {probability: 0.20, tts: "forgetful, contradicting themselves sometimes"}

conversation_structure:
  min_turns: 3
  max_turns: 6
  typical_turns: 4
  backchannel_probability: 0.4
  turn_range_overrides:
    numerical_state_tracking:
      min_turns: 6
      max_turns: 10

data_type_override:
  long_form: 1.0
